<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Erez Dalal – DJ</title>
  <meta name="description" content="DJ ארז דלל — הקצב מתחיל כאן. עקבו ברשתות והזמינו הופעה." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page" id="home">
    <div class="particles" id="particles"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>

    <!-- שם האמן (בפינה השמאלית-עליונה ב-RTL) -->
    <div class="top-left">
      <p class="dj-label">DJ</p>
      <h1 class="artist-name">EREZ<br>DALAL</h1>
      <p class="tagline">הקצב מתחיל כאן</p>
    </div>

    <!-- התקליט המסתובב -->
    <div class="disk-wrapper" id="diskWrapper">
      <div class="disk" id="disk">
        <div class="groove g1"></div>
        <div class="groove g2"></div>
        <div class="groove g3"></div>
        <div class="groove g4"></div>
        <div class="groove g5"></div>
        <div class="groove g6"></div>
        <div class="groove g7"></div>
        <div class="groove g8"></div>

        <!-- טבעת התמונות (מסתובבת עם התקליט, נשארת זקופה) -->
        <div class="photo-ring">
          <div class="photo-item p1"><img src="https://picsum.photos/seed/dj1/300/300" alt="DJ Set" /></div>
          <div class="photo-item p2"><img src="https://picsum.photos/seed/dj2/300/300" alt="Stage" /></div>
          <div class="photo-item p3"><img src="https://picsum.photos/seed/dj3/300/300" alt="Crowd" /></div>
          <div class="photo-item p4"><img src="https://picsum.photos/seed/dj4/300/300" alt="Mix" /></div>
          <div class="photo-item p5"><img src="https://picsum.photos/seed/dj5/300/300" alt="Festival" /></div>
          <div class="photo-item p6"><img src="https://picsum.photos/seed/dj6/300/300" alt="Studio" /></div>
        </div>

        <div class="disk-shine"></div>
      </div>

      <!-- מרכז קבוע (label שלא מסתובב) -->
      <div class="disk-center-static">
        <div class="center-label">
          <img src="https://picsum.photos/seed/djcenter/520/520" alt="Erez Dalal" />
        </div>
      </div>
    </div>

    <!-- כפתורי רשתות + הזמנה (בצד הימני ב-RTL) -->
    <div class="right-panel">
      <div class="social-buttons">
        <a href="#" target="_blank" rel="noopener" class="social-btn instagram">
          <i class="fab fa-instagram"></i><span>Instagram</span>
        </a>
        <a href="#" target="_blank" rel="noopener" class="social-btn facebook">
          <i class="fab fa-facebook-f"></i><span>Facebook</span>
        </a>
        <a href="mailto:booking@erezdalal.com" class="social-btn gmail">
          <i class="fas fa-envelope"></i><span>Gmail</span>
        </a>
        <a href="#" target="_blank" rel="noopener" class="social-btn spotify">
          <i class="fab fa-spotify"></i><span>Spotify</span>
        </a>
        <a href="#" target="_blank" rel="noopener" class="social-btn youtube">
          <i class="fab fa-youtube"></i><span>YouTube</span>
        </a>
        <a href="#" target="_blank" rel="noopener" class="social-btn tiktok">
          <i class="fab fa-tiktok"></i><span>TikTok</span>
        </a>
      </div>
      <a href="mailto:booking@erezdalal.com" class="book-btn">
        <i class="fas fa-calendar-check"></i>
        הזמן עכשיו
      </a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
